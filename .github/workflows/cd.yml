name: CD - Deploy to Azure

on:
  workflow_run:
    workflows:
      - CI - Build and Test
    types:
      - completed
    branches:
      - master

permissions:
  contents: read
  actions: read

env:
  AZURE_WEBAPP_NAME: my-app13389884
  RESOURCE_GROUP: health_check

jobs:
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🔍 Debug workflow
      run: |
        echo "Run ID: ${{ github.event.workflow_run.id }}"
        echo "Workflow: ${{ github.event.workflow_run.name }}"

    # 🔥 Download artifact from CI workflow
    - name: 📦 Download artifact from CI
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GH_TOKEN }}
        script: |
          const run_id = context.payload.workflow_run.id;
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: run_id,
          });

          const artifact = artifacts.data.artifacts.find(a => a.name === "build-artifacts");

          if (!artifact) {
            throw new Error("Artifact not found");
          }

          const download = await github.rest.actions.downloadArtifact({
            owner: context.repo.owner,
            repo: context.repo.repo,
            artifact_id: artifact.id,
            archive_format: "zip",
          });

          const fs = require("fs");
          fs.writeFileSync("artifact.zip", Buffer.from(download.data));

    - name: 📂 Extract artifact
      run: |
        mkdir -p artifacts
        unzip artifact.zip -d artifacts
        ls -la artifacts

    - name: 🔐 Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        resource-group: ${{ env.RESOURCE_GROUP }}
        package: ./artifacts/dist

    - name: ⏳ Wait for deployment
      run: sleep 30

    - name: ✅ Validate deployment
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"

        echo "Testing deployment at $APP_URL"

        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $APP_URL)

        if [ $HTTP_STATUS -eq 200 ]; then
          echo "✅ Deployment successful"
          echo "🌐 Application URL: $APP_URL"
        else
          echo "❌ Deployment validation failed - HTTP Status: $HTTP_STATUS"
          exit 1
        fi

    - name: 📢 Deployment Summary
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"

        echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
        echo "- 🌐 App URL: $APP_URL" >> $GITHUB_STEP_SUMMARY
        echo "🎉 CD_SUCCESS: $APP_URL"

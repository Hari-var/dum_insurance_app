name: 🚀 CD - Deploy Application

on:
  workflow_dispatch:
    inputs:
      approval_id:
        description: Approval ID from Terraform workflow
        required: true
        type: string

env:
  AZURE_WEBAPP_NAME: my-app13389884
  AZURE_WEBAPP_PACKAGE_PATH: .

jobs:
  deploy:
    name: 🚀 Deploy to Azure Web App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 📦 Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: dist

    - name: 🔐 Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: dist

    - name: 🌍 Get App URL
      id: get-url
      run: |
        APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
        echo "APP_URL=$APP_URL" >> $GITHUB_ENV
        echo "🌍 Live URL: $APP_URL"

    - name: ✅ Deployment Summary
      run: |
        echo "## 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
        echo "- **App URL**: ${{ steps.get-url.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: dev" >> $GITHUB_STEP_SUMMARY
        echo "🎉 CD_SUCCESS: ${{ steps.get-url.outputs.app_url }}"
